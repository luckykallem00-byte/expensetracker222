<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-wrapper { max-width: 500px; width: 100%; animation: fadeInUp 0.6s ease; }
        .login-card { background: white; border-radius: 30px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo-icon { width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 25px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .logo-icon i { font-size: 2.8rem; color: white; }
        .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #667eea, #764ba2); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .logo .tagline { color: #64748b; }
        .info-card { background: #f8fafc; border-radius: 20px; margin-bottom: 1.5rem; padding: 1.2rem; color: #334155; }
        .google-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: #4285f4; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(66, 133, 244, 0.2); }
        .register-link { text-align: center; margin-top: 1.5rem; color: #64748b; }
        .register-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }
        .helper-text { color: #475569; font-size: 0.95rem; margin-top: 1rem; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .login-card { padding: 1.5rem; } .logo h1 { font-size: 1.7rem; } }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="ri-funds-line"></i>
                </div>
                <h1>FinancePro</h1>
                <p class="tagline">Sign in with Google to manage your expenses</p>
            </div>
            <div class="info-card">
                <p>Sign in with your Google account to access your personal expense tracker.</p>
            </div>
            <button id="google-signin-btn" class="google-btn">
                <i class="ri-google-line"></i>
                Continue with Google
            </button>
            <div class="register-link">
                <p>Need help? <a href="register.html">Learn how to sign in</a></p>
            </div>
        </div>
    </div>
    <script type="module">
        import { initFirebase, signInWithGoogle, getAuthUser } from '/js/auth.js';

        window.addEventListener('DOMContentLoaded', async () => {
            await initFirebase();
            const activeUser = getAuthUser();
            if (activeUser) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('google-signin-btn').addEventListener('click', async () => {
                try {
                    await signInWithGoogle();
                } catch (error) {
                    alert(error.message || 'Google sign-in failed.');
                }
            });
        });
    </script>
</body>
</html>
